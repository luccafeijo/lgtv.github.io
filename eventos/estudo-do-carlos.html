<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Estudo do Carlos</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/estudo-do-carlos.css">
    </head>
    <body>
        <main class="timer-app">
            <section class="hero-panel">
                <p class="eyebrow">Tela para live</p>
                <h1>Estudo do Carlos</h1>
                <p class="description">
                    Digite o tempo, ajuste ao vivo quando precisar e ligue o modo chroma para destacar a area do contador na stream.
                </p>

                <div class="custom-time-panel">
                    <label class="field-label" for="custom-minutes">Tempo inicial em minutos</label>
                    <div class="time-input-row">
                        <input id="custom-minutes" class="time-input" type="number" min="1" step="1" value="15" inputmode="numeric">
                        <button class="action-button accent-outline" id="apply-time-button" type="button">Definir tempo</button>
                    </div>
                </div>

                <div class="time-boosts" aria-label="Adicionar tempo ao contador">
                    <button class="time-option" type="button" data-add-minutes="5">+5 min</button>
                    <button class="time-option" type="button" data-add-minutes="10">+10 min</button>
                    <button class="time-option" type="button" data-add-minutes="15">+15 min</button>
                </div>

                <label class="chroma-toggle" for="chroma-toggle">
                    <input id="chroma-toggle" type="checkbox">
                    <span>Ativar fundo de chroma no painel do timer</span>
                </label>

                <div class="controls">
                    <button class="action-button primary" id="start-button" type="button">Iniciar</button>
                    <button class="action-button" id="pause-button" type="button">Pausar</button>
                    <button class="action-button" id="reset-button" type="button">Resetar</button>
                </div>

                <p class="status-text" id="status-text">Pronto para começar uma nova sessao.</p>
            </section>

            <section class="display-panel">
                <div class="timer-shell">
                    <p class="timer-label">Tempo restante</p>
                    <div class="timer-screen" id="timer-screen">
                        <span id="minutes">15</span>
                        <span class="divider">:</span>
                        <span id="seconds">00</span>
                    </div>
                    <p class="selected-time">Tempo configurado: <strong id="selected-time">15 min</strong></p>
                </div>
            </section>
        </main>

        <audio id="alarm-audio" preload="auto" src="../sources/audio/yay.mp3"></audio>
        <script src="../js/estudo-do-carlos.js"></script>
    </body>
</html>
