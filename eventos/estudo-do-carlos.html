<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Estudo do Carlos</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/estudo-do-carlos.css">
    </head>
    <body>
        <main class="timer-app">
            <section class="hero-panel">
                <p class="eyebrow">Tela para live</p>
                <h1>Estudo do Carlos</h1>
                <p class="description">
                    Escolha o tempo em blocos de 15 minutos, inicie a contagem e deixe o alerta avisar quando o estudo terminar.
                </p>

                <div class="time-picker" id="time-picker" aria-label="Escolha o tempo do contador">
                    <button class="time-option active" type="button" data-minutes="15">15 min</button>
                    <button class="time-option" type="button" data-minutes="30">30 min</button>
                    <button class="time-option" type="button" data-minutes="45">45 min</button>
                    <button class="time-option" type="button" data-minutes="60">60 min</button>
                    <button class="time-option" type="button" data-minutes="75">75 min</button>
                    <button class="time-option" type="button" data-minutes="90">90 min</button>
                    <button class="time-option" type="button" data-minutes="105">105 min</button>
                    <button class="time-option" type="button" data-minutes="120">120 min</button>
                </div>

                <div class="controls">
                    <button class="action-button primary" id="start-button" type="button">Iniciar</button>
                    <button class="action-button" id="pause-button" type="button">Pausar</button>
                    <button class="action-button" id="reset-button" type="button">Resetar</button>
                </div>

                <p class="status-text" id="status-text">Pronto para começar uma nova sessao.</p>
            </section>

            <section class="display-panel">
                <div class="timer-shell">
                    <p class="timer-label">Tempo restante</p>
                    <div class="timer-screen" id="timer-screen">
                        <span id="minutes">15</span>
                        <span class="divider">:</span>
                        <span id="seconds">00</span>
                    </div>
                    <p class="selected-time">Tempo selecionado: <strong id="selected-time">15 min</strong></p>
                </div>
            </section>
        </main>

        <audio id="alarm-audio" preload="auto" src="../../sources/audio/yay.mp3"></audio>
        <script src="../js/estudo-do-carlos.js"></script>
    </body>
</html>
